name: Build Android APK (Sin EAS)

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "URL del servidor API (ej: https://workspace--vecrec46.replit.app)"
        required: true
        default: "https://workspace--vecrec46.replit.app"

jobs:
  build:
    name: Build APK de prueba
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurar Java 17 (requerido por Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependencias del workspace
        run: pnpm install --frozen-lockfile

      - name: Instalar Expo CLI
        run: npm install -g @expo/cli

      - name: Generar proyecto nativo Android (expo prebuild)
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_BASE: ${{ github.event.inputs.api_base_url }}

      - name: Dar permisos a gradlew
        working-directory: artifacts/mobile/android
        run: chmod +x gradlew

      - name: Cache de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK de prueba (Debug — no requiere firma)
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          EXPO_PUBLIC_API_BASE: ${{ github.event.inputs.api_base_url }}

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: PassPicPRO-preview-debug
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Mostrar info del APK
        run: |
          APK_PATH="artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK generado correctamente"
            echo "📦 Tamaño: $(du -sh $APK_PATH | cut -f1)"
            echo "📂 Ruta: $APK_PATH"
          else
            echo "❌ No se encontró el APK"
            exit 1
          fi
